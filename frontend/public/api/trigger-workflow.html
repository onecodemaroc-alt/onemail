<!DOCTYPE html>
<html dir="ltr"><head><meta charset="utf-8"/><title>Trigger Workflow</title></head><body>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyB1APHciGKZDK7t1k85nCKgnGGDMfytmzg",
  authDomain: "onemail-onecode.firebaseapp.com",
  projectId: "onemail-onecode",
  storageBucket: "onemail-onecode.firebasestorage.app",
  messagingSenderId: "83880691663",
  appId: "1:83880691663:web:e97c00f15c12005d3374ba"
});
const db = firebase.firestore();
firebase.auth().signInAnonymously().then(async () => {
  try {
    const doc = await db.collection('config').doc('github').get();
    if (!doc.exists) { document.body.textContent = '❌ Config not found'; return; }
    const { token, repo, workflow } = doc.data();
    const r = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/${workflow}/dispatches`, {
      method: 'POST',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref: 'main' }),
    });
    document.body.textContent = r.ok ? '✅ Workflow triggered' : '❌ Error: ' + r.status;
  } catch (e) {
    document.body.textContent = '❌ ' + e.message;
  }
});
</script>
</body></html>
