name: Send Campaigns & Check IMAP

on:
  workflow_dispatch:
  schedule:
    - cron: '*/1 * * * *'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: backend
      - run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json
        working-directory: backend
      - run: node run.js
        working-directory: backend
      - run: node quick-send.js
        working-directory: backend
      - run: node check-imap.js
        working-directory: backend
